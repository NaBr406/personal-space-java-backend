spring.application.name=personal-space-java-backend
server.port=${PORT:3001}

spring.datasource.url=jdbc:sqlite:${APP_DB_PATH:./data/personal-space-java-sandbox.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=personal-space-sandbox-pool

spring.sql.init.mode=always
spring.sql.init.continue-on-error=false
spring.jackson.default-property-inclusion=non_null

management.endpoints.web.exposure.include=health,info

app.env-name=${APP_ENV:sandbox}
app.data-dir=${APP_DATA_DIR:./data}
app.default-avatar=/default-avatar.png
app.super-admin-username=${APP_SUPER_ADMIN_USERNAME:NaBr406}
app.super-admin-nickname=${APP_SUPER_ADMIN_NICKNAME:NaBr406}
app.super-admin-password=${ADMIN_PASSWORD:admin123}
